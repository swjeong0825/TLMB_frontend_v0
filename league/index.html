<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tennis League Management Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Noto+Sans+KR:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <script>
      (function () {
        var t = localStorage.getItem("tlchat-theme");
        if (!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body data-i18n-title-key="meta.titleLeagueChat">
    <div id="app-root"></div>
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search);
        var leagueId = p.get("league_id");
        var hostToken = p.get("host_token") || null;
        window.TLCHAT_ROUTE = leagueId ? { leagueId: leagueId, hostToken: hostToken } : null;
      })();
    </script>
    <script src="/js/i18n.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/user-facing-errors.js"></script>
    <script>
      TLCHAT_I18N.initPage();
    </script>
    <script src="/js/chat.js"></script>
  </body>
</html>
