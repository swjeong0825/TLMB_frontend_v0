<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create league — Tennis League Management Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Noto+Sans+KR:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <script>
      (function () {
        var t = localStorage.getItem("tlchat-theme");
        if (!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body data-i18n-title-key="meta.titleCreateLeague">
    <div id="tlchat-site-header-root"></div>
    <main class="landing create-league-page">
      <p class="create-league-back">
        <a href="/" data-i18n="common.homeLink"></a>
      </p>
      <h1 data-i18n="createLeague.h1"></h1>
      <p class="create-league-intro" data-i18n-html="createLeague.introHtml"></p>

      <form id="create-league-form" class="create-league-form" novalidate>
        <div class="form-grid">
          <label>
            <span>
              <span data-i18n="createLeague.labelTitle"></span>
              <span class="req">*</span>
            </span>
            <input
              type="text"
              name="title"
              required
              autocomplete="organization"
              maxlength="500"
              data-i18n-placeholder="createLeague.placeholderTitle"
            />
          </label>
          <label>
            <span>
              <span data-i18n="createLeague.labelHostEmail"></span>
              <span class="req">*</span>
            </span>
            <input
              type="email"
              name="host_email"
              required
              autocomplete="email"
              maxlength="320"
              data-i18n-placeholder="createLeague.placeholderHostEmail"
            />
            <p class="hint" data-i18n="createLeague.hostEmailHint"></p>
          </label>
        </div>

        <div class="form-grid create-league-main-rules">
            <div class="roster-field">
              <span data-i18n="createLeague.labelInitialPlayers"></span>
              <div
                class="chips-input"
                data-initial-players-chips
                data-enabled="true"
              >
                <input
                  type="text"
                  id="initial-players-chips-input"
                  class="chips-input-field"
                  autocomplete="off"
                  spellcheck="false"
                  data-i18n-placeholder="createLeague.initialPlayersChipsPlaceholder"
                  data-i18n-aria-label="createLeague.initialPlayersChipsAria"
                />
              </div>
              <p class="hint" data-i18n="createLeague.initialPlayersChipsHint"></p>
            </div>
            <label>
              <span class="field-label-with-help">
                <span data-i18n="createLeague.labelMatchPair"></span>
                <button
                  type="button"
                  class="help-icon"
                  data-help-key="matchPair"
                  aria-haspopup="dialog"
                  data-i18n-aria-label="createLeague.help.matchPairAria"
                >
                  ?
                </button>
              </span>
              <select name="match_pair_idempotency">
                <option value="once_per_day" selected data-i18n="createLeague.optionOncePerDay"></option>
                <option value="once_per_league" data-i18n="createLeague.optionOncePerLeague"></option>
                <option value="none" data-i18n="createLeague.optionAllowMultiple"></option>
              </select>
            </label>
            <label>
              <span class="field-label-with-help">
                <span data-i18n="createLeague.labelRankingSubject"></span>
                <button
                  type="button"
                  class="help-icon"
                  data-help-key="rankingSubject"
                  aria-haspopup="dialog"
                  data-i18n-aria-label="createLeague.help.rankingSubjectAria"
                >
                  ?
                </button>
              </span>
              <select name="ranking_subject">
                <option value="team" data-i18n="createLeague.optionRankingSubjectTeam"></option>
                <option value="player" selected data-i18n="createLeague.optionRankingSubjectPlayer"></option>
              </select>
            </label>
            <label>
              <span class="field-label-with-help">
                <span data-i18n="createLeague.labelTieBreakerPrimary"></span>
                <button
                  type="button"
                  class="help-icon"
                  data-help-key="tieBreakers"
                  aria-haspopup="dialog"
                  data-i18n-aria-label="createLeague.help.tieBreakersAria"
                >
                  ?
                </button>
              </span>
              <select name="tie_breaker_primary" data-tie-breaker="primary">
                <option value="matches_won" data-i18n="createLeague.metricMatchesWon"></option>
                <option value="match_diff" data-i18n="createLeague.metricMatchDiff"></option>
                <option value="games_won" selected data-i18n="createLeague.metricGamesWon"></option>
                <option value="games_lost" data-i18n="createLeague.metricGamesLost"></option>
                <option value="games_diff" data-i18n="createLeague.metricGamesDiff"></option>
                <option value="win_pct" data-i18n="createLeague.metricWinPct"></option>
              </select>
            </label>
        </div>

        <details class="create-league-advanced">
          <summary data-i18n="createLeague.advancedSummary"></summary>
          <p class="hint" data-i18n="createLeague.advancedHint"></p>
          <div class="form-grid">
            <label>
              <span data-i18n="createLeague.labelDescription"></span>
              <span class="optional-label" data-i18n="createLeague.optional"></span>
              <textarea
                name="description"
                rows="3"
                maxlength="2000"
                data-i18n-placeholder="createLeague.placeholderDescription"
              ></textarea>
            </label>
            <label>
              <span class="field-label-with-help">
                <span data-i18n="createLeague.labelLeagueTimezone"></span>
                <button
                  type="button"
                  class="help-icon"
                  data-help-key="leagueTimezone"
                  aria-haspopup="dialog"
                  data-i18n-aria-label="createLeague.help.leagueTimezoneAria"
                >
                  ?
                </button>
              </span>
              <select name="league_timezone" data-league-timezone-select></select>
            </label>
            <div class="roster-field">
              <span class="field-label-with-help roster-label-row">
                <span class="roster-label-with-toggle">
                  <label
                    for="one-team-per-player-toggle"
                    data-i18n="createLeague.labelOneTeamPerPlayerToggle"
                  ></label>
                  <input
                    type="checkbox"
                    name="one_team_per_player"
                    id="one-team-per-player-toggle"
                    class="roster-toggle-input"
                  />
                </span>
                <button
                  type="button"
                  class="help-icon"
                  data-help-key="oneTeamPerPlayer"
                  aria-haspopup="dialog"
                  data-i18n-aria-label="createLeague.help.oneTeamPerPlayerAria"
                >
                  ?
                </button>
              </span>
              <div class="roster-field-hints">
                <p class="hint" data-i18n="createLeague.oneTeamPerPlayerToggleHint"></p>
                <p class="hint create-league-cross-rule-hint" data-i18n="createLeague.crossRuleHint"></p>
              </div>
            </div>
            <div class="roster-field">
              <span class="field-label-with-help roster-label-row">
                <span class="roster-label-with-toggle">
                  <label
                    for="auto-register-toggle"
                    data-i18n="createLeague.labelAutoRegisterPlayersOnMatch"
                  ></label>
                  <input
                    type="checkbox"
                    name="auto_register_players_on_match"
                    id="auto-register-toggle"
                    class="roster-toggle-input"
                    data-auto-register-toggle
                  />
                </span>
                <button
                  type="button"
                  class="help-icon"
                  data-help-key="autoRegisterPlayersOnMatch"
                  aria-haspopup="dialog"
                  data-i18n-aria-label="createLeague.help.autoRegisterPlayersOnMatchAria"
                >
                  ?
                </button>
              </span>
              <p class="hint" data-i18n="createLeague.autoRegisterPlayersOnMatchHint"></p>
            </div>
            <label>
              <span data-i18n="createLeague.labelTieBreakerSecondary"></span>
              <select name="tie_breaker_secondary" data-tie-breaker="secondary">
                <option value="" selected data-i18n="createLeague.metricNone"></option>
                <option value="matches_won" data-i18n="createLeague.metricMatchesWon"></option>
                <option value="match_diff" data-i18n="createLeague.metricMatchDiff"></option>
                <option value="games_won" data-i18n="createLeague.metricGamesWon"></option>
                <option value="games_lost" data-i18n="createLeague.metricGamesLost"></option>
                <option value="games_diff" data-i18n="createLeague.metricGamesDiff"></option>
                <option value="win_pct" data-i18n="createLeague.metricWinPct"></option>
              </select>
            </label>
            <label>
              <span data-i18n="createLeague.labelTieBreakerTertiary"></span>
              <select name="tie_breaker_tertiary" data-tie-breaker="tertiary">
                <option value="" selected data-i18n="createLeague.metricNone"></option>
                <option value="matches_won" data-i18n="createLeague.metricMatchesWon"></option>
                <option value="match_diff" data-i18n="createLeague.metricMatchDiff"></option>
                <option value="games_won" data-i18n="createLeague.metricGamesWon"></option>
                <option value="games_lost" data-i18n="createLeague.metricGamesLost"></option>
                <option value="games_diff" data-i18n="createLeague.metricGamesDiff"></option>
                <option value="win_pct" data-i18n="createLeague.metricWinPct"></option>
              </select>
            </label>
          </div>
        </details>

        <div class="create-league-actions">
          <button type="submit" class="btn-primary" id="create-league-submit" data-i18n="createLeague.submit"></button>
        </div>
      </form>

      <div id="create-league-error" class="create-league-alert create-league-alert-error" hidden></div>

      <section id="create-league-success" class="create-league-success" hidden>
        <h2 data-i18n="createLeague.successH2"></h2>
        <p data-i18n="createLeague.successP"></p>
        <dl class="create-league-credentials">
          <div>
            <dt data-i18n="createLeague.hostToken"></dt>
            <dd>
              <code id="out-host-token"></code>
              <button type="button" class="btn-ghost" data-copy-target="out-host-token" data-i18n="createLeague.copy"></button>
            </dd>
          </div>
        </dl>
        <div class="create-league-links">
          <p><strong data-i18n="createLeague.openPages"></strong></p>
          <ul>
            <li><a id="link-player" href="#" data-i18n="createLeague.linkPlayer"></a></li>
            <li><a id="link-admin" href="#" data-i18n="createLeague.linkAdmin"></a></li>
          </ul>
        </div>
      </section>

      <p class="hint create-league-config-hint" data-i18n-html="common.configHint"></p>
    </main>

    <div id="create-league-help-modal" class="help-modal" hidden>
      <div class="help-modal-backdrop" tabindex="-1" aria-hidden="true"></div>
      <div
        class="help-modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="create-league-help-title"
      >
        <div class="help-modal-header">
          <h2 id="create-league-help-title" class="help-modal-title"></h2>
          <button
            type="button"
            class="help-modal-close"
            data-i18n-aria-label="createLeague.help.modalCloseAria"
          >
            ×
          </button>
        </div>
        <div id="create-league-help-body" class="help-modal-body"></div>
      </div>
    </div>
    <footer class="chat-footer">
      <span data-i18n="footer.backendSource"></span>
      <a href="https://github.com/swjeong0825/TLMB_backend_main" target="_blank" rel="noopener noreferrer">Backend Main</a>
      <a href="https://github.com/swjeong0825/TLMB_chat_to_intent" target="_blank" rel="noopener noreferrer">Chat-to-Intent Server</a>
    </footer>
    <script src="/js/i18n.js"></script>
    <script src="/js/site-header.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/user-facing-errors.js"></script>
    <script src="/js/create-league.js"></script>
    <script>
      TLCHAT_I18N.initPage();
    </script>
  </body>
</html>
